<script>
// Voice Recording — adds a microphone button to the chat input
(function() {
  'use strict';

  function initVoiceRecorder() {
    var inputArea = document.querySelector('textarea');
    var sendBtn = document.querySelector('button');
    if (!inputArea || !sendBtn) {
      setTimeout(initVoiceRecorder, 500);
      return;
    }

    var micBtn = document.createElement('button');
    micBtn.innerHTML = '\uD83C\uDFA4';
    micBtn.title = 'Record voice message';
    micBtn.style.cssText = 'font-size:1.2em;opacity:0.7;cursor:pointer;padding:0.75rem;border:none;background:transparent;border-radius:0.5rem;transition:opacity 0.2s;';
    sendBtn.parentNode.insertBefore(micBtn, sendBtn);

    var mediaRecorder = null;
    var chunks = [];
    var timerInterval = null;
    var startTime = 0;

    micBtn.addEventListener('click', function() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        micBtn.innerHTML = '\uD83C\uDFA4';
        micBtn.style.opacity = '0.7';
        clearInterval(timerInterval);
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus' : 'audio/webm';
        mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
        chunks = [];

        mediaRecorder.ondataavailable = function(e) { chunks.push(e.data); };
        mediaRecorder.onstop = function() {
          stream.getTracks().forEach(function(t) { t.stop(); });
          var blob = new Blob(chunks, { type: 'audio/webm' });

          micBtn.innerHTML = '\u23F3';
          inputArea.placeholder = 'Transcribing...';
          inputArea.disabled = true;

          var form = new FormData();
          form.append('audio', blob, 'recording.webm');
          var sessionId = window.__mycelosSessionId || '';

          fetch('/api/audio?session_id=' + encodeURIComponent(sessionId) + '&user_id=default', {
            method: 'POST',
            body: form
          }).then(function(resp) {
            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            function read() {
              reader.read().then(function(result) {
                if (result.done) return;
                var text = decoder.decode(result.value);
                text.split('\n').forEach(function(line) {
                  if (line.startsWith('data: ')) {
                    try {
                      var evt = JSON.parse(line.slice(6));
                      if (evt.type === 'session') window.__mycelosSessionId = evt.session_id;
                    } catch(e) {}
                  }
                });
                read();
              });
            }
            read();
          }).catch(function(err) {
            console.error('Voice upload failed:', err);
          }).finally(function() {
            micBtn.innerHTML = '\uD83C\uDFA4';
            micBtn.style.opacity = '0.7';
            inputArea.placeholder = 'Message Mycelos...';
            inputArea.disabled = false;
          });
        };

        mediaRecorder.start();
        micBtn.innerHTML = '\u23F9\uFE0F';
        micBtn.style.opacity = '1';
        startTime = Date.now();
        timerInterval = setInterval(function() {
          var s = Math.floor((Date.now() - startTime) / 1000);
          micBtn.title = 'Recording... ' + s + 's (click to stop)';
        }, 1000);

      }).catch(function(err) {
        if (err.name === 'NotAllowedError') {
          alert('Microphone access denied. Please allow microphone access in your browser settings.');
        } else {
          console.error('MediaRecorder error:', err);
        }
      });
    });
  }

  // Permission Widget — renders permission_prompt SSE events as interactive cards
  window._handlePermissionEvent = function(evt) {
    var chatArea = document.querySelector('.space-y-4');
    if (!chatArea) return;

    var permId = evt.permission_id || '';
    var agent = evt.agent || 'Agent';
    var card = document.createElement('div');
    card.style.cssText = 'border:1px solid var(--border);border-radius:0.5rem;padding:1rem;margin:0.5rem 0;background:rgba(245,158,11,0.1);';
    card.innerHTML = '<div style="color:#f59e0b;font-weight:bold;margin-bottom:0.5rem">\u26A0\uFE0F Permission Required</div>'
      + '<div><strong>' + agent + '</strong> \u2192 <code>' + (evt.tool || '') + '</code></div>'
      + '<div><code>' + (evt.target || '') + '</code></div>'
      + '<div style="font-style:italic;margin:0.5rem 0;opacity:0.8">"' + (evt.reason || '') + '"</div>'
      + '<div style="margin-top:0.75rem">'
      + '<label style="display:block;margin:0.25rem 0;cursor:pointer"><input type="radio" name="perm_' + permId + '" value="1" checked> Allow for ' + agent + ' (this session)</label>'
      + '<label style="display:block;margin:0.25rem 0;cursor:pointer"><input type="radio" name="perm_' + permId + '" value="2"> Allow for ' + agent + ' (always)</label>'
      + '<label style="display:block;margin:0.25rem 0;cursor:pointer"><input type="radio" name="perm_' + permId + '" value="3"> Allow for all agents (always)</label>'
      + '<label style="display:block;margin:0.25rem 0;cursor:pointer"><input type="radio" name="perm_' + permId + '" value="4"> Deny</label>'
      + '<label style="display:block;margin:0.25rem 0;cursor:pointer"><input type="radio" name="perm_' + permId + '" value="5"> Never allow for ' + agent + '</label>'
      + '</div>'
      + '<button style="margin-top:0.5rem;padding:0.5rem 1rem;border-radius:0.25rem;background:var(--accent,#3b82f6);color:white;border:none;cursor:pointer;font-size:0.875rem" '
      + 'onclick="window._submitPerm(this,\'' + permId + '\')">Confirm</button>';
    chatArea.appendChild(card);
    chatArea.scrollTop = chatArea.scrollHeight;
  };

  window._submitPerm = function(btn, permId) {
    var card = btn.closest('div[style]');
    var selected = card.querySelector('input[name=perm_' + permId + ']:checked');
    var value = selected ? selected.value : '1';
    var sessionId = window.__mycelosSessionId || '';

    fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: 'PERM:' + permId + ':' + value,
        session_id: sessionId,
      })
    });

    card.style.opacity = '0.5';
    btn.disabled = true;
    btn.textContent = 'Submitted';
  };

  function initFileUpload() {
    var inputArea = document.querySelector('textarea');
    var micBtn = document.querySelector('button[title="Record voice message"]');
    if (!inputArea || !micBtn) {
      setTimeout(initFileUpload, 500);
      return;
    }

    var uploadBtn = document.createElement('button');
    uploadBtn.innerHTML = '\uD83D\uDCCE';
    uploadBtn.title = 'Upload file';
    uploadBtn.style.cssText = 'font-size:1.2em;opacity:0.7;cursor:pointer;padding:0.75rem;border:none;background:transparent;border-radius:0.5rem;';
    micBtn.parentNode.insertBefore(uploadBtn, micBtn);

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    uploadBtn.addEventListener('click', function() { fileInput.click(); });

    fileInput.addEventListener('change', function() {
      if (!fileInput.files[0]) return;
      var file = fileInput.files[0];
      if (file.size > 50 * 1024 * 1024) {
        alert('File too large (max 50MB)');
        return;
      }
      uploadBtn.innerHTML = '\u23F3';
      var form = new FormData();
      form.append('file', file);
      var sessionId = window.__mycelosSessionId || '';
      fetch('/api/upload?session_id=' + encodeURIComponent(sessionId), {
        method: 'POST', body: form
      }).then(function(resp) {
        // Read SSE response
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        function read() {
          reader.read().then(function(r) {
            if (r.done) return;
            var text = decoder.decode(r.value);
            text.split('\n').forEach(function(line) {
              if (line.startsWith('data: ')) {
                try {
                  var evt = JSON.parse(line.slice(6));
                  if (evt.type === 'session') window.__mycelosSessionId = evt.session_id;
                } catch(e) {}
              }
            });
            read();
          });
        }
        read();
      }).finally(function() {
        uploadBtn.innerHTML = '\uD83D\uDCCE';
        fileInput.value = '';
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { initVoiceRecorder(); initFileUpload(); });
  } else {
    initVoiceRecorder();
    initFileUpload();
  }
})();
</script>
