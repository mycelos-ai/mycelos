              </div>
            </template>
          </div>

          <!-- Action buttons -->
          <div class="flex items-center gap-2 flex-shrink-0">
            <!-- Toggle edit/view (existing note) -->
            <template x-if="selectedNote && !creatingNew">
              <button @click="toggleEdit()"
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-label uppercase tracking-widest
                             transition-colors"
                      :class="editing
                        ? 'bg-primary/10 text-primary'
                        : 'bg-surface-container text-on-surface-variant hover:text-primary'">
                <span class="material-symbols-outlined text-sm" x-text="editing ? 'visibility' : 'edit'"></span>
                <span x-text="editing ? 'Preview' : t('common.edit')"></span>
              </button>
            </template>

            <!-- Move to topic -->
            <template x-if="selectedNote && !creatingNew">
              <div class="relative" x-data="{ moveOpen: false }">
                <button @click="moveOpen = !moveOpen"
                        class="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs
                               bg-surface-container text-on-surface-variant hover:text-primary transition-colors"
                        title="Move to topic">
                  <span class="material-symbols-outlined text-sm">drive_file_move</span>
                </button>
                <div x-show="moveOpen" @click.outside="moveOpen = false" x-transition x-cloak
                     class="absolute right-0 top-full mt-1 bg-surface-container rounded-lg shadow-xl py-1 z-50 min-w-[180px]"
                     style="border: 1px solid rgba(70, 72, 77, 0.3); max-height: 240px; overflow-y: auto;">
                  <template x-for="topic in topics" :key="topic.path">
                    <button @click="moveNoteTo(selectedNote, topic.path); moveOpen = false"
                            class="w-full text-left px-4 py-2 text-xs hover:bg-surface-container-high transition-colors flex items-center gap-2">
                      <span class="material-symbols-outlined text-xs text-tertiary">folder</span>
                      <span x-text="topic.title" class="truncate"></span>
                    </button>
                  </template>
                  <div x-show="topics.length === 0" class="px-4 py-2 text-xs text-on-surface-variant/50">
                    No topics yet
                  </div>
                </div>
              </div>
            </template>

            <!-- Reclassify (send back to organizer) -->
            <template x-if="selectedNote && !creatingNew">
              <button @click="reclassifyNote(selectedNote)"
                      class="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs
                             bg-surface-container text-on-surface-variant hover:text-tertiary transition-colors"
                      title="Re-classify with AI">
                <span class="material-symbols-outlined text-sm">auto_fix_high</span>
              </button>
            </template>

            <!-- AI enhance dropdown -->
            <div x-show="editing || creatingNew" class="relative" x-data="{ aiOpen: false }">
              <button @click="aiOpen = !aiOpen"
                      :disabled="enhancing"
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-label uppercase tracking-widest
                             bg-tertiary/10 text-tertiary hover:bg-tertiary/20 transition-colors
                             disabled:opacity-50">
                <span class="material-symbols-outlined text-sm" x-text="enhancing ? 'progress_activity' : 'auto_awesome'"></span>
                <span x-text="enhancing ? 'Working...' : 'AI'"></span>
              </button>
              <div x-show="aiOpen" @click.outside="aiOpen = false" x-transition
                   class="absolute right-0 top-full mt-1 bg-surface-container rounded-lg shadow-xl py-1 z-50 min-w-[160px]"
                   style="border: 1px solid rgba(70, 72, 77, 0.3);">
                <button @click="enhanceNote('improve'); aiOpen = false"
                        class="w-full text-left px-4 py-2 text-sm hover:bg-surface-container-high transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">edit_note</span> Improve
                </button>
                <button @click="enhanceNote('expand'); aiOpen = false"
                        class="w-full text-left px-4 py-2 text-sm hover:bg-surface-container-high transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">expand</span> Expand
                </button>
                <button @click="enhanceNote('summarize'); aiOpen = false"
                        class="w-full text-left px-4 py-2 text-sm hover:bg-surface-container-high transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">summarize</span> Summarize
                </button>
                <button @click="enhanceNote('organize'); aiOpen = false"
                        class="w-full text-left px-4 py-2 text-sm hover:bg-surface-container-high transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">reorder</span> Organize
                </button>
              </div>
            </div>

            <!-- Save button -->
            <button x-show="editing || creatingNew"
                    @click="saveNote()"
                    :disabled="saving"
                    class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs font-label font-bold uppercase tracking-widest
                           bg-primary text-on-primary-fixed hover:bg-primary-dim transition-colors
                           disabled:opacity-50 disabled:cursor-not-allowed">
              <span class="material-symbols-outlined text-sm" x-text="saving ? 'hourglass_empty' : 'save'"></span>
              <span x-text="saving ? 'Saving...' : t('common.save')"></span>
            </button>

            <!-- Download source file (documents only) -->
            <template x-if="selectedNote && selectedNote.source_file && !creatingNew">
              <a :href="'/api/knowledge/documents/' + encodeURIComponent(selectedNote.source_file)"
                 target="_blank" download
                 class="w-9 h-9 rounded-lg flex items-center justify-center
                        text-on-surface-variant/40 hover:text-primary hover:bg-primary/10 transition-colors"
                 title="Download original document">
                <span class="material-symbols-outlined text-lg">download</span>
              </a>
            </template>

            <!-- Vision analysis (scanned documents only) -->
            <template x-if="selectedNote && selectedNote.source_file && parseTags(selectedNote.tags).includes('scanned') && !creatingNew">
              <button @click="analyzeWithVision()"
                      class="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs
                             bg-tertiary/10 text-tertiary hover:bg-tertiary/20 transition-colors"
                      title="Analyze with Vision AI">
                <span class="material-symbols-outlined text-sm">visibility</span>
                <span>Vision</span>
              </button>
            </template>

            <!-- Split note -->
            <template x-if="selectedNote && !creatingNew && !editing">
              <button @click="splitNote()"
                      class="w-9 h-9 rounded-lg flex items-center justify-center
                             text-on-surface-variant/40 hover:text-tertiary hover:bg-tertiary/10 transition-colors"
                      title="Split into sub-notes">
                <span class="material-symbols-outlined text-lg">call_split</span>
              </button>
            </template>

            <!-- Archive button (existing note) -->
            <template x-if="selectedNote && !creatingNew">
              <button @click="archiveNote()"
                      class="w-9 h-9 rounded-lg flex items-center justify-center
                             text-on-surface-variant/40 hover:text-warning hover:bg-warning/10 transition-colors"
                      title="Archive note">
                <span class="material-symbols-outlined text-lg">archive</span>
              </button>
            </template>

            <!-- Delete button (existing note) -->
            <template x-if="selectedNote && !creatingNew">
              <button @click="deleteNote()"
                      class="w-9 h-9 rounded-lg flex items-center justify-center
                             text-on-surface-variant/40 hover:text-error hover:bg-error/10 transition-colors"
                      :title="t('common.delete')"
                      title="Delete note">
                <span class="material-symbols-outlined text-lg">delete</span>
              </button>
            </template>
          </div>
        </div>

        <!-- Note body -->
        <div class="flex-1 overflow-y-auto px-6 py-6">
          <div class="max-w-3xl mx-auto">

            <!-- View mode: rendered Markdown -->
            <div x-show="!editing && !creatingNew"
                 class="prose-note text-[15px] leading-relaxed text-on-surface font-light animate-fade-in"
                 x-html="renderMarkdown(noteContent)">
            </div>

            <!-- Edit mode / New note: raw Markdown textarea -->
            <div x-show="editing || creatingNew" class="animate-fade-in">
              <textarea x-model="editContent"
                        class="edit-textarea w-full min-h-[60vh] bg-surface-container-lowest text-on-surface
                               text-[15px] leading-relaxed font-body
                               border border-transparent rounded-xl p-6
                               focus:border-primary/30 focus:ring-0 focus:outline-none
                               resize-none placeholder:text-on-surface-variant/30"
                        placeholder="Write your note in Markdown..."></textarea>
            </div>

            <!-- Loading state for content -->
            <div x-show="loadingContent" class="animate-pulse space-y-4 py-4">
              <div class="h-6 bg-surface-container rounded w-2/3"></div>
              <div class="h-4 bg-surface-container rounded w-full"></div>
              <div class="h-4 bg-surface-container rounded w-5/6"></div>
              <div class="h-4 bg-surface-container rounded w-4/5"></div>
              <div class="h-4 bg-surface-container rounded w-full"></div>
              <div class="h-4 bg-surface-container rounded w-3/4"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Empty state: no note selected (desktop only) -->
      <section x-show="!selectedNote && !creatingNew && !mobileView"
               class="flex-1 hidden md:flex flex-col items-center justify-center text-center px-8">
        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-tertiary/20 to-primary/10 p-[1px] mb-6">
          <div class="w-full h-full rounded-full bg-surface-container-low flex items-center justify-center relative overflow-hidden">
            <span class="material-symbols-outlined text-3xl text-tertiary/60">auto_stories</span>
            <div class="absolute inset-0 bg-tertiary/5 animate-pulse"></div>
          </div>
        </div>
        <h2 class="font-headline text-xl font-bold tracking-tight text-on-surface/60 mb-2">Select a note</h2>
        <p class="text-on-surface-variant/40 max-w-sm text-sm leading-relaxed">
          Choose a note from the list to view its content, or create a new one to start capturing knowledge.
        </p>
        <button @click="newNote()"
                class="btn-secondary mt-6">
          <span class="material-symbols-outlined text-sm">add</span>
          <span x-text="t('knowledge.create')">Create</span>
        </button>
      </section>

    </div>
  </main>

  <!-- Mobile navigation container (loaded by layout.js) -->
  <nav id="mobile-nav"></nav>

  <script>
    /**
     * Render Markdown content to HTML using marked.js.
     */
    let _mermaidCounter = 0;
    // Global note title set for wikilink existence checks (updated by loadNotes)
    window._knownNoteTitles = new Set();

    function renderMarkdown(text) {
      if (!text) return '';
      let html;
      if (typeof marked !== 'undefined') {
        html = marked.parse(text);
      } else {
        html = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
      }
      // Convert Obsidian-style wikilinks [[Note Title]] to clickable internal links
      // Check existence against loaded notes — unresolved links get different styling
      html = html.replace(
        /\[\[([^\]|]+?)(?:\|([^\]]+?))?\]\]/g,
        (_, target, label) => {
          const display = label || target;
          const encoded = encodeURIComponent(target.trim());
          const exists = window._knownNoteTitles.has(target.trim().toLowerCase());
          const cls = exists ? 'wikilink' : 'wikilink wikilink-unresolved';
          const title = exists ? target.trim() : target.trim() + ' (not found — click to create)';
          return `<a href="#" class="${cls}" data-note="${encoded}" title="${title}">${display}</a>`;
        }
      );

      // Convert mermaid code blocks to renderable containers
      html = html.replace(
        /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
        (_, code) => {
          const id = 'mermaid-' + (++_mermaidCounter);
          const decoded = code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
          return `<div class="mermaid-container my-4"><pre class="mermaid" id="${id}">${decoded}</pre></div>`;
        }
      );
      // Trigger mermaid rendering after DOM update
      if (html.includes('class="mermaid"') && typeof mermaid !== 'undefined') {
        setTimeout(() => mermaid.run(), 50);
      }
      return html;
    }

    /**
     * Knowledge Base Alpine.js component.
     * Manages note list, search, selection, editing, and creation.
     */
    function parseTags(tags) {
      if (Array.isArray(tags)) return tags;
      if (typeof tags === 'string') {
        try { return JSON.parse(tags); } catch { return []; }
      }
      return [];
    }

    function knowledgeApp() {
      let searchTimeout = null;

      return {
        notes: [],
        filteredNotes: [],
        searchQuery: '',
        selectedNote: null,
        noteContent: '',
        editing: false,
        editContent: '',
        loading: true,
        loadingContent: false,
        saving: false,
        enhancing: false,
        creatingNew: false,
        newTitle: '',
        mobileView: false,
        viewMode: 'topics',
        topics: [],
        topicChildren: [],
        expandedTopic: null,
        uncategorizedNotes: [],
        draggedNote: null,
        dragOverTopic: null,
        overdueTasks: [],
        openTasks: [],
        doneTasks: [],

        async initKnowledge() {
          this.checkMobileView();
          window.addEventListener('resize', () => this.checkMobileView());
          // Reload topics + notes when the organizer inbox changes something
          window.addEventListener('mycelos:knowledge-changed', async () => {
            await this.loadNotes();
            await this.loadTopics();
          });
          await this.loadNotes();
          await this.loadTopics();

          // Organizer inbox: open a note when clicked in the suggestion list
          window.addEventListener('mycelos:open-note', async (e) => {
            const path = e.detail && e.detail.path;
            if (path) {
              const match = this.notes.find(n => n.path === path);
              if (match) {
                await this.selectNote(match);
              } else {
                // Note might not be in the current list (e.g., different filter)
                await this.selectNote({ path, title: path.split('/').pop() });
              }
            }
          });

          // Open note from URL ?note=... (e.g., from chat link or wikilink)
          const noteParam = new URLSearchParams(window.location.search).get('note');
          if (noteParam) {
            await this.navigateToNote(encodeURIComponent(noteParam));
          }

          // Handle browser Back/Forward buttons
          window.addEventListener('popstate', (e) => {
            if (e.state && e.state.note) {
              // Find note directly by path, skip history push
              const target = e.state.note.toLowerCase();
              const match = this.notes.find(n =>
                (n.path || '').toLowerCase() === target ||
                (n.title || '').toLowerCase() === target
              );
              if (match) this.selectNote(match, true);
            } else {
              this.selectedNote = null;
              this.noteContent = '';
              history.replaceState({}, '', '/pages/knowledge.html');
            }
          });
        },

        /**
         * Detect mobile viewport (below md breakpoint).
         */
        checkMobileView() {
          this.mobileView = window.innerWidth < 768;
        },

        /**
         * Fetch all notes from the API.
         */
        async enhanceNote(action) {
          if (!this.editContent.trim()) return;
          this.enhancing = true;
          try {
            const res = await fetch('/api/knowledge/enhance', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: this.editContent, action }),
            });
            const data = await res.json();
            if (data.error) {
              alert('AI error: ' + data.error);
            } else if (data.content) {
              this.editContent = data.content;
            }
          } catch (e) {
            alert('AI enhance failed: ' + e.message);
          } finally {
            this.enhancing = false;
          }
        },

        startNewNote(title) {
          this.creatingNew = true;
          this.editing = true;
          this.selectedNote = null;
          this.editTitle = title || '';
          this.editContent = '# ' + (title || 'New Note') + '\n\n';
          this.noteContent = '';
        },

        async navigateToNote(title) {
          const target = decodeURIComponent(title).toLowerCase().trim();

          // 1. Exact title match (strongest)
          let match = this.notes.find(n => (n.title || '').toLowerCase() === target);

          // 2. Exact path match
          if (!match) {
            match = this.notes.find(n => (n.path || '').toLowerCase() === target);
          }

          // 3. Title slug match (e.g., "AWS IAM" matches path ending "aws-iam-2")
          if (!match) {
            const slug = target.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            match = this.notes.find(n => {
              const pathEnd = (n.path || '').split('/').pop().toLowerCase();
              return pathEnd === slug || pathEnd.startsWith(slug + '-');
            });
          }

          if (match) {
            this.selectNote(match);
          } else {
            // 4. Fallback: API search for exact title
            try {
              const data = await MycelosAPI.get('/api/knowledge/notes?search=' + encodeURIComponent(target));
              const results = Array.isArray(data) ? data : (data.notes || []);
              // Only accept exact title match — don't jump to random results
              const exact = results.find(r => (r.title || '').toLowerCase() === target);
              if (exact) {
                this.selectNote(exact);
              } else if (confirm('Note "' + target + '" not found. Create it?')) {
                this.startNewNote(target);
              }
            } catch {
              if (confirm('Note "' + target + '" not found. Create it?')) {
                this.startNewNote(target);
              }
            }
          }
        },

        buildBreadcrumb(note) {
          if (!note) return [];
          // Use parent_path if set; otherwise derive from the note's own
          // path prefix (e.g. "tasks/foo" → breadcrumb shows "Tasks").
          let source = note.parent_path;
          if (!source && note.path && note.path.includes('/')) {
            source = note.path.rsplit ? note.path.split('/').slice(0, -1).join('/')
                                      : note.path.substring(0, note.path.lastIndexOf('/'));
          }
          if (!source) return [];
          const parts = source.split('/');
          const segments = [];
          let cumulative = '';
          for (const part of parts) {
            if (!part) continue;
            cumulative = cumulative ? cumulative + '/' + part : part;
            segments.push({
              path: cumulative,
              label: part.charAt(0).toUpperCase() + part.slice(1).replace(/-/g, ' '),
            });
          }
          return segments;
        },
        navigateToBreadcrumb(topicPath) {
          this.viewMode = 'topics';
          this.loadTopics();
          this.$nextTick(() => this.toggleTopic({ path: topicPath }));
        },

        async moveNoteTo(note, topicPath) {
          if (!note || !topicPath) return;
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(note.path), {
              parent_path: topicPath,
            });
            await this.loadNotes();
            await this.loadTopics();
            // Re-select to refresh breadcrumb
            const updated = this.notes.find(n => n.path === note.path);
            if (updated) this.selectNote(updated);
          } catch (e) {
            console.warn('Move failed:', e);
          }
        },

        async reclassifyNote(note) {
          if (!note) return;
          try {
            // Flip back to pending so the organizer picks it up
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(note.path), {
              organizer_state: 'pending',
            });
            // Trigger immediate organizer run
            await fetch('/api/organizer/run', { method: 'POST' });
            await this.loadNotes();
            await this.loadTopics();
            // Re-select to refresh breadcrumb
            const updated = this.notes.find(n => n.path === note.path);
            if (updated) this.selectNote(updated);
          } catch (e) {
            console.warn('Reclassify failed:', e);
          }
        },

        async createTopic(parent) {
          const parentLabel = parent ? parent.split('/').pop() : '';
          const hint = parent ? `Sub-topic under ${parentLabel}:` : 'Topic name:';
          const name = prompt(hint);
          if (!name || !name.trim()) return;
          try {
            await fetch('/api/knowledge/topics', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: name.trim(), parent: parent || undefined }),
            });
            await this.loadNotes();
            await this.loadTopics();
          } catch (e) { /* ignore */ }
        },

        async importVault(file) {
          if (!file) return;
          const form = new FormData();
          form.append('file', file);
          try {
            this.loading = true;
            const res = await fetch('/api/knowledge/import', { method: 'POST', body: form });
            const data = await res.json();
            if (data.error) {
              alert('Import error: ' + data.error);
            } else {
              alert(`Imported ${data.imported} notes` + (data.skipped ? `, ${data.skipped} skipped` : ''));
              await this.loadNotes();
              await this.loadTopics();
            }
          } catch (e) {
            alert('Import failed: ' + e.message);
          } finally {
            this.loading = false;
          }
        },

        async loadNotes() {
          this.loading = true;
          try {
            const data = await MycelosAPI.get('/api/knowledge/notes');
            this.notes = Array.isArray(data) ? data : (data.notes || []);
            this.filteredNotes = this.notes;
            // Build title index for wikilink existence checks
            window._knownNoteTitles = new Set(
              this.notes.map(n => (n.title || '').toLowerCase())
            );
          } catch (e) {
            console.warn('Could not load notes:', e.message);
            this.notes = [];
            this.filteredNotes = [];
          } finally {
            this.loading = false;
          }
        },

        /**
         * Debounced search: waits 300ms after last keystroke.
         */
        debouncedSearch() {
          if (searchTimeout) clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => this.searchNotes(), 300);
        },

        /**
         * Execute search against the API or filter locally.
         */
        async searchNotes() {
          const query = this.searchQuery.trim();
          if (!query) {
            this.filteredNotes = this.notes;
            return;
          }
          try {
            const data = await MycelosAPI.get('/api/knowledge/notes?query=' + encodeURIComponent(query));
            this.filteredNotes = Array.isArray(data) ? data : (data.notes || []);
          } catch (e) {
            // Fallback: client-side filter by title
            const q = query.toLowerCase();
            this.filteredNotes = this.notes.filter(n =>
              (n.title || '').toLowerCase().includes(q) ||
              (n.preview || '').toLowerCase().includes(q) ||
              (n.tags || []).some(t => t.toLowerCase().includes(q))
            );
          }
        },

        /**
         * Select a note and load its full content.
         */
        async selectNote(note, skipHistory) {
          this.creatingNew = false;
          this.editing = false;
          this.selectedNote = note;
          this.noteContent = '';
          this.editContent = '';
          this.loadingContent = true;

          // Track in browser history (unless called from popstate)
          if (!skipHistory) {
            const noteId = note.path || note.title || '';
            history.pushState({ note: noteId }, '', '?note=' + encodeURIComponent(noteId));
          }

          try {
            const data = await MycelosAPI.get('/api/knowledge/notes/' + encodeURIComponent(note.path));
            this.noteContent = data.content || '';
            this.editContent = this.noteContent;
            // Merge detail-only metadata (reminder, remind_at, remind_via)
            // into selectedNote so the badges below the title can render.
            // List view already provides type/status/due, but remind_at is
            // only exposed via the detail endpoint.
            this.selectedNote = {
              ...this.selectedNote,
              type: data.type ?? this.selectedNote.type,
              status: data.status ?? this.selectedNote.status,
              due: data.due ?? this.selectedNote.due,
              reminder: data.reminder ?? this.selectedNote.reminder,
              remind_at: data.remind_at ?? null,
              remind_via: data.remind_via ?? null,
            };
          } catch (e) {
            console.warn('Could not load note content:', e.message);
            this.noteContent = '*Failed to load note content.*';
          } finally {
            this.loadingContent = false;
          }
        },

        /**
         * Build a hover tooltip for task list rows. Surfaces due date and
         * reminder status (with remind_at if present) so users get the
         * context without having to open the detail pane. remind_at is
         * only loaded on detail, so list-level tooltips fall back to due.
         */
        taskTooltip(task) {
          if (!task) return '';
          const parts = [task.title || ''];
          if (task.due) {
            try {
              const d = new Date(task.due);
              if (!isNaN(d.getTime())) {
                parts.push('Due: ' + d.toLocaleDateString(undefined, {
                  year: 'numeric', month: 'short', day: 'numeric'
                }));
              }
            } catch { /* ignore */ }
          }
          if (task.reminder) {
            if (task.remind_at) {
              parts.push('Reminder: ' + this.formatRemindAt(task.remind_at));
            } else {
              parts.push('Reminder on');
            }
          }
          return parts.filter(Boolean).join(' · ');
        },

        /**
         * Convert a stored ISO-UTC datetime to the local format expected
         * by <input type="datetime-local">: "YYYY-MM-DDTHH:mm". If no
         * value is set, default to the due date at 09:00 local.
         */
        remindAtForInput(iso) {
          try {
            const base = iso ? new Date(iso) : null;
            let d;
            if (base && !isNaN(base.getTime())) {
              d = base;
            } else if (this.selectedNote && this.selectedNote.due) {
              d = new Date(this.selectedNote.due);
              if (isNaN(d.getTime())) d = new Date();
              d.setHours(9, 0, 0, 0);
            } else {
              d = new Date();
              d.setHours(9, 0, 0, 0);
            }
            const pad = (n) => String(n).padStart(2, '0');
            return d.getFullYear() + '-'
              + pad(d.getMonth() + 1) + '-'
              + pad(d.getDate()) + 'T'
              + pad(d.getHours()) + ':'
              + pad(d.getMinutes());
          } catch {
            return '';
          }
        },

        /**
         * Persist a new remind_at datetime via the existing /remind endpoint
         * and reflect the change locally so the badge updates immediately.
         * Empty input clears remind_at (falls back to "any time on due day").
         */
        async saveRemindAt(localStr) {
          if (!this.selectedNote || !this.selectedNote.path) return;
          const due = this.selectedNote.due;
          if (!due) return;
          // datetime-local is a naive local timestamp — convert to an ISO
          // string in UTC so the backend stores a single canonical value.
          let remindAtIso = null;
          if (localStr) {
            const d = new Date(localStr);
            if (!isNaN(d.getTime())) remindAtIso = d.toISOString();
          }
          try {
            const res = await fetch(
              '/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path) + '/remind',
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ when: due, remind_at: remindAtIso }),
              }
            );
            if (!res.ok) throw new Error('failed');
            this.selectedNote = { ...this.selectedNote, remind_at: remindAtIso, reminder: true };
          } catch (e) {
            console.warn('saveRemindAt failed:', e);
          }
        },

        /**
         * Format an ISO datetime for the reminder badge: "Apr 12, 09:00"
         * or just the date if time is 00:00 (midnight = "whole day").
         */
        formatRemindAt(iso) {
          if (!iso) return '';
          try {
            const d = new Date(iso);
            if (isNaN(d.getTime())) return String(iso);
            const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            const h = d.getHours();
            const m = d.getMinutes();
            if (h === 0 && m === 0) return dateStr;
            const timeStr = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
            return dateStr + ', ' + timeStr;
          } catch {
            return String(iso);
          }
        },

        /**
         * Deselect the current note (used for mobile back navigation).
         */
        deselectNote() {
          this.selectedNote = null;
          this.creatingNew = false;
          this.editing = false;
          this.noteContent = '';
          this.editContent = '';
        },

        /**
         * Toggle between edit and view mode.
         */
        toggleEdit() {
          if (this.editing) {
            // Switching to view: update rendered content from edit buffer
            this.noteContent = this.editContent;
          }
          this.editing = !this.editing;
        },

        /**
         * Start creating a new note.
         */
        newNote() {
          this.selectedNote = null;
          this.creatingNew = true;
          this.editing = false;
          this.newTitle = '';
          this.editContent = '';
          this.noteContent = '';
        },

        /**
         * Save the current note (create or update).
         */
        async saveNote() {
          if (this.saving) return;
          this.saving = true;

          try {
            if (this.creatingNew) {
              // Create new note
              const data = await MycelosAPI.post('/api/knowledge/notes', {
                title: this.newTitle.trim() || 'Untitled',
                content: this.editContent,
              });
              // Reload notes and select the new one
              await this.loadNotes();
              const created = this.notes.find(n => n.path === (data.path || data.note_path));
              if (created) {
                this.creatingNew = false;
                await this.selectNote(created);
              } else {
                this.creatingNew = false;
                this.selectedNote = null;
              }
            } else if (this.selectedNote) {
              // Update existing note
              await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path), {
                content: this.editContent,
              });
              this.noteContent = this.editContent;
              this.editing = false;
              // Refresh note list to update preview
              await this.loadNotes();
            }
          } catch (e) {
            console.warn('Could not save note:', e.message);
          } finally {
            this.saving = false;
          }
        },

        async loadTopics() {
          try {
            this.topics = await MycelosAPI.get('/api/knowledge/topics');
            // Uncategorized = notes whose parent_path is empty, or is a
            // bucket name (notes/tasks) rather than an actual topic path.
            const topicPaths = new Set(this.topics.map(t => t.path));
            this.uncategorizedNotes = this.notes.filter(n =>
              n.type !== 'topic' && !topicPaths.has(n.parent_path)
            );
          } catch (e) {
            this.topics = [];
          }
        },

        async toggleTopic(topic) {
          if (this.expandedTopic === topic.path) {
            this.expandedTopic = null;
            this.topicChildren = [];
            return;
          }
          this.expandedTopic = topic.path;
          try {
            this.topicChildren = await MycelosAPI.get('/api/knowledge/topics/' + encodeURIComponent(topic.path) + '/children');
          } catch (e) {
            this.topicChildren = [];
          }
        },

        showUncategorized() {
          this.expandedTopic = '__uncategorized';
          const topicPaths = new Set(this.topics.map(t => t.path));
          this.uncategorizedNotes = this.notes.filter(n =>
            n.type !== 'topic' && !topicPaths.has(n.parent_path)
          );
        },

        async renameTopic(topic, newName) {
          if (!newName.trim() || newName.trim() === topic.title) return;
          try {
            const res = await MycelosAPI.post(
              '/api/knowledge/topics/' + encodeURIComponent(topic.path) + '/rename',
              { name: newName.trim() }
            );
            if (res.new_path) {
              await this.loadTopics();
              window.dispatchEvent(new CustomEvent('mycelos:knowledge-changed'));
            }
          } catch (e) {
            console.warn('Rename failed:', e.message);
          }
        },

        async loadTasks() {
          const allTasks = this.notes.filter(n => n.type === 'task');
          const now = new Date().toISOString().slice(0, 10);
          this.overdueTasks = allTasks.filter(t => t.due && t.due < now && t.status !== 'done');
          this.openTasks = allTasks.filter(t => t.status !== 'done' && !(t.due && t.due < now));
          this.doneTasks = allTasks.filter(t => t.status === 'done');
        },

        async toggleDone(task) {
          const newStatus = task.status === 'done' ? 'open' : 'done';
          try {
            if (newStatus === 'done') {
              await MycelosAPI.post('/api/knowledge/notes/' + encodeURIComponent(task.path) + '/done');
            } else {
              await MycelosAPI.post('/api/knowledge/notes/' + encodeURIComponent(task.path), { status: 'open' });
            }
            task.status = newStatus;
            if (this.viewMode === 'tasks') this.loadTasks();
            if (this.expandedTopic) {
              const tp = this.expandedTopic;
              await this.toggleTopic({ path: tp });
              await this.toggleTopic({ path: tp });
            }
          } catch (e) { console.warn('Toggle done failed:', e.message); }
        },

        async toggleReminder(note) {
          if (!note.due) return;
          try {
            await MycelosAPI.post('/api/knowledge/notes/' + encodeURIComponent(note.path) + '/remind', { when: note.due });
            note.reminder = !note.reminder;
          } catch (e) { console.warn('Toggle reminder failed:', e.message); }
        },

        async deleteNote() {
          if (!this.selectedNote) return;
          if (!confirm('Delete this note? This cannot be undone.')) return;

          try {
            await MycelosAPI.delete('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path));
            this.selectedNote = null;
            this.noteContent = '';
            this.editing = false;
            await this.loadNotes();
          } catch (e) {
            console.warn('Could not delete note:', e.message);
          }
        },

        async toggleTaskStatus() {
          if (!this.selectedNote) return;
          const newStatus = this.selectedNote.status === 'done' ? 'open' : 'done';
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path),
              { status: newStatus });
            this.selectedNote.status = newStatus;
            const inList = this.notes.find(n => n.path === this.selectedNote.path);
            if (inList) inList.status = newStatus;
          } catch (e) {
            console.warn('Status toggle failed:', e.message);
          }
        },

        async archiveNote() {
          if (!this.selectedNote) return;
          if (!confirm('Archive this note?')) return;
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path),
              { archive: true });
            this.notes = this.notes.filter(n => n.path !== this.selectedNote.path);
            this.selectedNote = null;
            this.noteContent = '';
            window.dispatchEvent(new CustomEvent('mycelos:knowledge-changed'));
          } catch (e) {
            console.warn('Archive failed:', e.message);
          }
        },

        async analyzeWithVision() {
          if (!this.selectedNote) return;
          if (!confirm('Analyze this document with Vision AI?')) return;
          try {
            const res = await MycelosAPI.post('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path) + '/vision');
            if (res.status === 'analyzed') {
              await this.selectNote(this.selectedNote);
            }
          } catch (e) {
            console.warn('Vision analysis failed:', e.message);
          }
        },

        async splitNote() {
          if (!this.selectedNote) return;
          try {
            const proposal = await MycelosAPI.post(
              '/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path) + '/split',
              { confirm: false }
            );
            if (proposal.status === 'proposed' && proposal.sections) {
              const sectionList = proposal.sections.map((s, i) => `${i+1}. ${s}`).join('\n');
              if (confirm(`Split into ${proposal.sections.length} sections?\n\n${sectionList}`)) {
                const result = await MycelosAPI.post(
                  '/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path) + '/split',
                  { confirm: true }
                );
                if (result.status === 'split') {
                  await this.loadNotes();
                  await this.selectNote(this.selectedNote);
                  window.dispatchEvent(new CustomEvent('mycelos:knowledge-changed'));
                }
              }
            }
          } catch (e) {
            console.warn('Split failed:', e.message);
          }
        },

        async removeTag(index) {
          if (!this.selectedNote) return;
          const tags = parseTags(this.selectedNote.tags).filter((_, i) => i !== index);
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path),
              { tags });
            this.selectedNote.tags = tags;
            const inList = this.notes.find(n => n.path === this.selectedNote.path);
            if (inList) inList.tags = tags;
          } catch (e) {
            console.warn('Remove tag failed:', e.message);
          }
        },

        async addTag(tag) {
          if (!this.selectedNote || !tag) return;
          const tags = [...parseTags(this.selectedNote.tags), tag];
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path),
              { tags });
            this.selectedNote.tags = tags;
            const inList = this.notes.find(n => n.path === this.selectedNote.path);
            if (inList) inList.tags = tags;
          } catch (e) {
            console.warn('Add tag failed:', e.message);
          }
        },

        async setPriority(level) {
          if (!this.selectedNote) return;
          try {
            await MycelosAPI.put('/api/knowledge/notes/' + encodeURIComponent(this.selectedNote.path),
              { priority: level });
            this.selectedNote.priority = level;
            const inList = this.notes.find(n => n.path === this.selectedNote.path);
            if (inList) inList.priority = level;
          } catch (e) {
            console.warn('Set priority failed:', e.message);
          }
        },
      };
    }
  </script>
