<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mycelos - Documentation</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="/shared/tailwind-config.js"></script>
  <link rel="stylesheet" href="/shared/base.css">
  <script src="/shared/api.js"></script>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/layout.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* Documentation prose styles */
    .docs-prose h2 {
      font-family: var(--font-headline);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-top: 3rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(70, 72, 77, 0.2);
      scroll-margin-top: 6rem;
    }
    .docs-prose h2:first-child { margin-top: 0; }
    .docs-prose h3 {
      font-family: var(--font-headline);
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--on-surface);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      scroll-margin-top: 6rem;
    }
    .docs-prose p {
      color: var(--on-surface-variant);
      line-height: 1.8;
      margin-bottom: 1rem;
      font-size: 0.9375rem;
    }
    .docs-prose ul, .docs-prose ol {
      padding-left: 1.25rem;
      margin-bottom: 1rem;
    }
    .docs-prose ul li {
      list-style-type: disc;
      color: var(--on-surface-variant);
      line-height: 1.8;
      margin-bottom: 0.25rem;
      font-size: 0.9375rem;
    }
    .docs-prose ol li {
      list-style-type: decimal;
      color: var(--on-surface-variant);
      line-height: 1.8;
      margin-bottom: 0.25rem;
      font-size: 0.9375rem;
    }
    .docs-prose strong {
      color: var(--primary);
      font-weight: 600;
    }
    .docs-prose code {
      background: rgba(0, 0, 0, 0.35);
      padding: 0.125rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.8125rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--primary);
    }
    .docs-prose pre {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(70, 72, 77, 0.15);
      border-radius: 0.5rem;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1rem 0 1.5rem;
      font-size: 0.8125rem;
      line-height: 1.7;
    }
    .docs-prose pre code {
      background: none;
      padding: 0;
      color: var(--on-surface);
      font-size: 0.8125rem;
    }
    .docs-prose a {
      color: var(--secondary);
      text-decoration: underline;
      text-decoration-color: rgba(35, 188, 254, 0.3);
    }
    .docs-prose a:hover {
      text-decoration-color: var(--secondary);
    }
    .docs-prose blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 1rem;
      margin: 1rem 0;
      color: var(--on-surface-variant);
      font-style: italic;
    }

    /* Table of contents mini-nav */
    .docs-toc {
      scrollbar-width: thin;
      scrollbar-color: rgba(70, 72, 77, 0.3) transparent;
    }
    .docs-toc a {
      display: block;
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
      color: rgba(170, 171, 176, 0.7);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 200ms ease;
    }
    .docs-toc a:hover {
      color: var(--primary);
      border-left-color: rgba(106, 214, 255, 0.3);
    }
    .docs-toc a.active {
      color: var(--primary);
      border-left-color: var(--primary);
      background: rgba(106, 214, 255, 0.05);
    }

    /* API endpoint badges */
    .method-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }
    .method-get { background: rgba(72, 199, 142, 0.15); color: #48c78e; }
    .method-post { background: rgba(35, 188, 254, 0.15); color: var(--secondary); }
    .method-delete { background: rgba(255, 113, 108, 0.15); color: var(--error); }

    /* Architecture diagram */
    .arch-layer {
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      text-align: center;
      font-family: var(--font-label);
      font-size: 0.8125rem;
      font-weight: 600;
      position: relative;
    }
    .arch-layer::after {
      content: '';
      display: block;
      width: 1px;
      height: 1rem;
      background: rgba(106, 214, 255, 0.3);
      margin: 0 auto;
      position: absolute;
      bottom: -1rem;
      left: 50%;
    }
    .arch-layer:last-child::after { display: none; }
  </style>
</head>

<body x-data="mycelosApp()" class="bg-[var(--surface)] text-[var(--on-surface)] font-body overflow-hidden h-screen flex">

  <!-- Sidebar container (loaded by layout.js) -->
  <div id="sidebar"></div>
  <div id="quick-capture"></div>

  <!-- Main content area -->
  <main class="flex-1 flex flex-col md:pl-64 min-w-0 bg-[var(--surface)]">

    <!-- Header container (loaded by layout.js) -->
    <div id="header"></div>

    <!-- Documentation content -->
    <section class="flex-1 overflow-y-auto pt-20 pb-16 px-4 md:px-8" id="docs-scroll-area">
      <div class="max-w-6xl mx-auto flex gap-8">

        <!-- Table of Contents — sticky mini-nav (left) -->
        <aside class="hidden lg:block w-56 flex-shrink-0">
          <div class="sticky top-4 docs-toc">
            <p class="text-[10px] font-label uppercase tracking-widest text-[var(--on-surface-variant)] opacity-50 mb-3 px-3">On this page</p>
            <nav class="space-y-0.5" x-data="docsToc()" x-init="loadToc()">
              <template x-for="s in sections" :key="s.slug">
                <a :href="'#' + s.slug" x-text="s.title"></a>
              </template>
            </nav>
          </div>
        </aside>

        <!-- Main documentation content -->
        <div class="flex-1 min-w-0 docs-prose" x-data="docsContent()" x-init="loadDocs()">

          <!-- Page title -->
          <div class="mb-8">
            <div class="flex items-center gap-3 mb-4">
              <span class="material-symbols-outlined text-[var(--primary)] text-3xl">description</span>
              <h1 class="font-headline text-3xl font-bold tracking-tight text-[var(--on-surface)]">Documentation</h1>
            </div>
            <p class="text-[var(--on-surface-variant)] text-base max-w-2xl">
              Everything you need to install, configure, and use Mycelos — your security-first agent operating system.
            </p>
          </div>

          <!-- Mobile TOC toggle -->
          <div class="lg:hidden mb-6" x-data="{ tocOpen: false }">
            <button @click="tocOpen = !tocOpen"
                    class="w-full flex items-center justify-between px-4 py-3 rounded-lg bg-[var(--surface-container)] text-[var(--on-surface-variant)] text-sm">
              <span class="flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">toc</span>
                Table of Contents
              </span>
              <span class="material-symbols-outlined text-sm transition-transform" :class="tocOpen && 'rotate-180'">expand_more</span>
            </button>
            <div x-show="tocOpen" x-transition class="mt-2 p-4 rounded-lg bg-[var(--surface-container)] docs-toc"
                 x-data="docsToc()" x-init="loadToc()">
              <template x-for="s in sections" :key="s.slug">
                <a :href="'#' + s.slug" x-text="s.title" @click="tocOpen = false"></a>
              </template>
            </div>
          </div>

          <!-- Loading state -->
          <template x-if="loading">
            <div class="flex items-center gap-3 text-[var(--on-surface-variant)]">
              <div class="w-4 h-4 border-2 border-[var(--primary)] border-t-transparent rounded-full animate-spin"></div>
              Loading documentation...
            </div>
          </template>

          <!-- Rendered sections -->
          <template x-for="section in sections" :key="section.slug">
            <div>
              <h2 :id="section.slug" x-text="section.title" class="scroll-mt-24"></h2>
              <div x-html="renderMarkdown(section.content)"></div>
            </div>
          </template>

          <div class="h-16"></div>

        </div><!-- /docs-prose -->
      </div>
    </section>

  </main>

  <!-- Mobile navigation container (loaded by layout.js) -->
  <nav id="mobile-nav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    function renderMarkdown(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') {
        return marked.parse(text);
      }
      return text;
    }

    function docsToc() {
      return {
        sections: [],
        async loadToc() {
          try {
            const res = await fetch('/api/docs');
            this.sections = await res.json();
          } catch (e) {
            console.error('Failed to load TOC:', e);
          }
        }
      };
    }

    function docsContent() {
      return {
        sections: [],
        loading: true,
        async loadDocs() {
          try {
            const res = await fetch('/api/docs');
            const list = await res.json();
            const loaded = [];
            for (const item of list) {
              const docRes = await fetch('/api/docs/' + item.slug);
              if (docRes.ok) {
                const doc = await docRes.json();
                loaded.push(doc);
              }
            }
            this.sections = loaded;
            // Re-init TOC highlighting after content renders
            this.$nextTick(() => initTocHighlighting());
          } catch (e) {
            console.error('Failed to load docs:', e);
          } finally {
            this.loading = false;
          }
        }
      };
    }
  </script>

  <script>
    /**
     * Active TOC link highlighting on scroll.
     * Called after dynamic content loads via Alpine.js.
     */
    function initTocHighlighting() {
      const scrollArea = document.getElementById('docs-scroll-area');
      const tocLinks = document.querySelectorAll('.docs-toc a');
      const sections = [];

      tocLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.startsWith('#')) {
          const target = document.getElementById(href.slice(1));
          if (target) sections.push({ link, target });
        }
      });

      if (scrollArea && sections.length > 0) {
        scrollArea.addEventListener('scroll', () => {
          const scrollTop = scrollArea.scrollTop + 120;
          let activeSection = sections[0];

          for (const section of sections) {
            if (section.target.offsetTop <= scrollTop) {
              activeSection = section;
            }
          }

          tocLinks.forEach(l => l.classList.remove('active'));
          if (activeSection) activeSection.link.classList.add('active');
        });
      }
    }
  </script>

</body>
</html>
