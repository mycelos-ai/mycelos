# Mycelos — Docker Compose (two-container deployment)
#
# Quick start:
#   ./scripts/install.sh          # recommended — guided setup
#   # or:
#   cp .env.example .env && edit .env && docker compose up -d
#
# The proxy container owns .master_key. The gateway never sees it.

services:
  proxy:
    image: ghcr.io/mycelos-ai/mycelos:main
    container_name: mycelos-proxy
    environment:
      - MYCELOS_ROLE=proxy
      - MYCELOS_DATA_DIR=/data
      - MYCELOS_PROXY_PORT=9110
      - MYCELOS_PROXY_TOKEN=${MYCELOS_PROXY_TOKEN:?set MYCELOS_PROXY_TOKEN in .env}
    volumes:
      # Proxy needs the full data directory — SQLite's WAL file
      # (mycelos.db-wal) must sit next to the database file, and
      # file-level bind mounts don't expose sibling files that the
      # gateway creates later. Mounting a single .db file made the
      # proxy see a stale main-database snapshot while the gateway's
      # recent writes lived in the WAL; `mycelos credential list`
      # disagreed with the Settings UI for exactly that reason.
      #
      # .master_key is still only meaningful here: the gateway never
      # decrypts credentials itself (DelegatingCredentialProxy routes
      # every read/write through this container), and the Phase 1b
      # isolation story is about the CODE path, not the filesystem.
      - ${MYCELOS_DATA_DIR:-./data}:/data
    networks:
      - mycelos-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9110/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s

  gateway:
    image: ghcr.io/mycelos-ai/mycelos:main
    container_name: mycelos-gateway
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      # Bind to localhost only by default — Mycelos has no authentication
      # (outside of optional MYCELOS_PASSWORD Basic Auth) until Phase 2.
      # To expose on the LAN, override MYCELOS_BIND=0.0.0.0 in .env AND
      # set a strong MYCELOS_PASSWORD.
      - "${MYCELOS_BIND:-127.0.0.1}:${MYCELOS_PORT:-9100}:9100"
    volumes:
      # Gateway owns the full data dir except the master key (separate
      # bind-mount on the proxy, not visible here).
      - ${MYCELOS_DATA_DIR:-./data}:/data
    environment:
      - MYCELOS_ROLE=gateway
      - MYCELOS_DATA_DIR=/data
      - MYCELOS_PROXY_URL=http://proxy:9110
      - MYCELOS_PROXY_TOKEN=${MYCELOS_PROXY_TOKEN:?set MYCELOS_PROXY_TOKEN in .env}
      # Optional — protect the Gateway with HTTP Basic Auth. Strongly
      # recommended the moment you expose the port beyond localhost,
      # because Passkey-based auth does not ship until Phase 2.
      - MYCELOS_PASSWORD=${MYCELOS_PASSWORD:-}
    networks:
      # Phase 1b: gateway is off the default (internet-capable) network.
      # Every outbound call flows through the proxy container or fails.
      - mycelos-internal
    restart: unless-stopped

networks:
  mycelos-internal:
    driver: bridge
