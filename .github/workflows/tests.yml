name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # Don't try to checkout embedded repos (insp/)

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          MYCELOS_MASTER_KEY: "ci-test-key-not-real"
        run: |
          python -m pytest tests/ --ignore=tests/integration --ignore=tests/e2e --ignore=tests/security -x --tb=short -q

      - name: Run security tests
        env:
          MYCELOS_MASTER_KEY: "ci-test-key-not-real"
        run: |
          python -m pytest tests/security/ -v --tb=short
