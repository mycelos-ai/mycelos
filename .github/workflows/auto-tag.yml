name: Auto-Tag Release

# Triggers when pyproject.toml version changes on main.
# Creates an annotated git tag `vX.Y.Z` and a matching GitHub Release
# with CHANGELOG.md excerpt as the body. Skipped if the tag already
# exists (e.g. version bumped and reverted).

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"     >> "$GITHUB_OUTPUT"
          echo "Discovered version: $version"

      - name: Skip if tag already exists
        id: exists
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.exists.outputs.exists == 'false'
        id: notes
        run: |
          # Grab everything between the current version header and the next top-level header.
          awk -v tag="${{ steps.version.outputs.tag }}" '
            $0 ~ "^## "tag" " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG.md section found for ${{ steps.version.outputs.tag }} — using fallback body." >&2
            echo "Release ${{ steps.version.outputs.tag }}" > /tmp/release-notes.md
          fi

      - name: Create annotated tag
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
