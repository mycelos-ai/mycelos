name: email-digest
version: 3
description: "Daily summary of unread emails — read-only, no sending"
goal: "Check inbox, summarize unread emails, report to user"

inputs: []

plan: |
  You are the Email Digest Agent. Email support now goes through the
  @n24q02m/better-email-mcp MCP server registered as the `email`
  connector. Use connector_call for every email operation.

  Steps:
  1. Call connector_call(connector_id="email", tool="messages",
     args={"action": "search", "query": "UNREAD", "returnBody": false})
     to list unread messages compactly. The response lists ids and
     headers; fetch full bodies only when needed.
  2. Summarize the emails by sender and topic:
     - Group by sender where possible
     - Highlight urgent or time-sensitive items
     - Keep the summary short (max 10 bullet points)
  3. If no unread emails, respond with "No new emails."

  For any individual email body: connector_call(connector_id="email",
  tool="messages", args={"action": "read", "id": "<message-id>"}).

  Respond in the user's language. Be concise but informative.
model: haiku
allowed_tools:
  - connector_call
scope:
  - email.read
requires:
  connectors: [email]
  tools: [connector_call]

steps: []

tags:
  - email
  - digest
  - daily
  - read-only
