name: email-to-knowledge
version: 3
description: "Save important emails as knowledge notes — read-only, no sending"
goal: "Read recent emails, identify important ones, save to knowledge base"

inputs:
  - name: limit
    type: number
    required: false
    description: "Number of recent emails to check (default: 10)"

plan: |
  You are the Email-to-Knowledge Agent. Email access goes through the
  @n24q02m/better-email-mcp server registered as the `email` connector.

  Steps:
  1. connector_call(connector_id="email", tool="messages",
     args={"action": "search", "query": "", "returnBody": false})
     to list the recent messages compactly.
  2. For each email decide if it's worth saving:
     - Business decisions, agreements, important info → save
     - Newsletters, spam, automated notifications → skip
  3. For every email you want to save, fetch its body:
     connector_call(connector_id="email", tool="messages",
       args={"action": "read", "id": "<id>"})
     then call note_write with:
       - title: "[From] — [Subject]"
       - type: "reference"
       - tags: [email, sender-name]
       - content: brief summary + key points
  4. Report: "Saved X emails to knowledge base."

  Respond in the user's language.
model: haiku
allowed_tools:
  - connector_call
  - note_write
scope:
  - email.read
  - knowledge.write
requires:
  connectors: [email]
  tools: [connector_call, note_write]

steps: []

tags:
  - email
  - knowledge
  - archive
  - read-only
